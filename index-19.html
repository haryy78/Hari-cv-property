<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hari Baharudin — Property Specialist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
    /* ─────────────────────────────────────────
       TOKEN WARNA — Dark Sultan, tidak diubah
    ───────────────────────────────────────── */
    :root {
        --sidebar-bg:  #0b0f1a;
        --sidebar-bg2: #0f1422;
        --main-bg:     #111827;  /* default dark */
        --accent:      #3d7eff;
        --accent2:     #60a5fa;
        --accent-dim:  rgba(61,126,255,0.12);
        --accent-glow: rgba(61,126,255,0.22);
        --gold:        #f5b731;
        --gold2:       #fdd87a;
        --gold-dim:    rgba(245,183,49,0.12);
        --gold-border: rgba(245,183,49,0.28);
        --teal:        #34d9c3;
        --teal-dim:    rgba(52,217,195,0.10);
        --sidebar-text:   #e2e8f0;
        --sidebar-muted:  #64748b;
        --sidebar-border: rgba(255,255,255,0.07);
        --main-text:    #e2e8f0;  /* default dark */
        --main-muted:   #94a3b8;  /* default dark */
        --main-subtle:  #1e293b;  /* default dark */
        --main-border:  rgba(255,255,255,0.08);  /* default dark */
        --shadow-blue:  0 8px 32px rgba(61,126,255,0.18);
        --transition:   0.25s cubic-bezier(0.4,0,0.2,1);
    }
    /* ── Dark mode (malam) — semua elemen ikut gelap ── */
    [data-theme="dark"] {
        --main-bg:      #111827;
        --main-text:    #e2e8f0;
        --main-muted:   #94a3b8;
        --main-subtle:  #1e293b;
        --main-border:  rgba(255,255,255,0.08);
        --comp-color:   #e2e8f0;
    }
    /* ── Light mode ── */
    [data-theme="light"] {
        --sidebar-bg:   #1e3a5f;
        --sidebar-bg2:  #162d4d;
        --accent:       #2563eb;
        --accent2:      #3b82f6;
        --accent-dim:   rgba(37,99,235,0.12);
        --shadow-blue:  0 8px 32px rgba(37,99,235,0.15);
        --main-bg:      #ffffff;
        --main-text:    #0f172a;
        --main-muted:   #475569;
        --main-subtle:  #f1f5f9;
        --main-border:  rgba(0,0,0,0.08);
        --comp-color:   #0f172a;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
        font-family:'DM Sans', sans-serif;
        background:#dde3ee;
        display:flex; justify-content:center; align-items:flex-start;
        min-height:100vh;
        padding:24px 12px 60px;
    }

    /* ─── Shell & Toolbar ─── */
    .page-shell { width:100%; max-width:540px; position:relative; }

    .toolbar {
        display:flex; justify-content:flex-end; gap:8px;
        margin-bottom:10px; padding-right:2px;
        animation:fadeDown 0.5s ease both;
    }
    .tb-btn {
        width:34px; height:34px; border-radius:10px;
        border:1px solid rgba(255,255,255,0.18);
        background:rgba(255,255,255,0.14); backdrop-filter:blur(10px);
        color:#fff; font-size:0.72rem;
        display:flex; align-items:center; justify-content:center;
        cursor:pointer; transition:var(--transition); text-decoration:none;
    }
    .tb-btn:hover { background:rgba(255,255,255,0.28); transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,0.2); }

    /* ─── CV Card — dua kolom dipertahankan ─── */
    .cv-container {
        width:100%; background:var(--main-bg); min-height:100vh;
        box-shadow:0 24px 80px rgba(0,0,0,0.22);
        display:flex; position:relative;
        border-radius:20px; overflow:hidden;
        animation:riseUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }

    /* ═══════════════════════════════════════
       SIDEBAR  38%
    ═══════════════════════════════════════ */
    .sidebar {
        width:38%; flex-shrink:0;
        background:linear-gradient(175deg, var(--sidebar-bg) 0%, var(--sidebar-bg2) 100%);
        color:var(--sidebar-text);
        padding:36px 14px 36px;
        display:flex; flex-direction:column;
        position:relative; overflow:hidden;
    }
    .sidebar::before {
        content:''; position:absolute; top:-60px; left:-60px;
        width:220px; height:220px; border-radius:50%;
        background:radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
        pointer-events:none;
    }
    .sidebar::after {
        content:''; position:absolute; inset:0;
        background-image:
            linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
            linear-gradient(90deg,rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size:28px 28px; pointer-events:none;
    }

    /* ── SATU foto profil ── */
    .photo-box {
        width:88px; height:88px; border-radius:50%;
        margin:0 auto 14px;
        border:2.5px solid var(--accent); overflow:hidden;
        background:#1e293b;
        display:flex; align-items:center; justify-content:center;
        position:relative; z-index:1;
        box-shadow:0 0 0 5px var(--accent-dim), var(--shadow-blue);
        transition:var(--transition);
        animation:photoIn 0.8s cubic-bezier(0.16,1,0.3,1) 0.4s both;
    }
    .photo-box:hover { transform:scale(1.05); box-shadow:0 0 0 9px var(--accent-dim), var(--shadow-blue); }
    .photo-box img { width:100%; height:100%; object-fit:cover; display:block; }
    .photo-placeholder { font-family:'Plus Jakarta Sans',sans-serif; font-size:1.8rem; font-weight:700; color:var(--accent2); }

    /* ── Nama ── */
    .name-tag { text-align:center; position:relative; z-index:1; animation:fadeUp 0.5s ease 0.5s both; }
    .name-tag h1 { font-family:'Plus Jakarta Sans',sans-serif; font-size:0.88rem; font-weight:700; letter-spacing:1.5px; line-height:1.25; text-transform:uppercase; }
    .name-tag p  { font-size:0.55rem; color:var(--accent2); font-weight:600; letter-spacing:2px; margin-top:4px; text-transform:uppercase; font-family:'DM Mono',monospace; }

    /* ── Heading sidebar ── */
    .sidebar-heading {
        font-size:0.55rem; font-family:'DM Mono',monospace;
        font-weight:500; text-transform:uppercase; letter-spacing:2px;
        margin:20px 0 9px;
        display:flex; align-items:center; gap:7px;
        color:var(--sidebar-muted);
        padding-bottom:6px; border-bottom:1px solid var(--sidebar-border);
        position:relative; z-index:1;
    }
    .sidebar-heading i { color:var(--accent); font-size:0.6rem; }

    /* ══════════════════════════════════════════
       STATISTIK CAROUSEL
       Wrapper luar (.sb-carousel) menyembunyikan
       overflow sehingga hanya satu atau dua kotak
       yang terlihat sekaligus. Track di dalamnya
       (.sb-track) bergeser dengan CSS transform.
       Dot indicator di bawah menunjukkan posisi aktif.
    ══════════════════════════════════════════ */
    .sb-carousel {
        position:relative; z-index:1;
        overflow:hidden;           /* sembunyikan kotak yang di luar view */
        margin-top:2px;
        border-radius:10px;
        /* Gradient fade di kanan sebagai petunjuk "masih ada konten" */
        -webkit-mask:linear-gradient(90deg, black 70%, transparent 100%);
        mask:linear-gradient(90deg, black 70%, transparent 100%);
        cursor:grab;
    }
    .sb-carousel:active { cursor:grabbing; }

    /* Track: semua kotak berjajar horizontal */
    .sb-track {
        display:flex; gap:6px;
        transition:transform 0.45s cubic-bezier(0.25,1,0.5,1);
        will-change:transform;     /* hint ke GPU agar transisi mulus */
        user-select:none;
    }

    /* Setiap kotak: lebar 42% sehingga 2.3 kotak terlihat sekaligus
       → pengguna langsung tahu ada yang tersembunyi → mendorong geser */
    .sb-stat {
        flex:0 0 42%;              /* tidak menyusut, lebar tetap 42% */
        background:rgba(255,255,255,0.04);
        border:1px solid rgba(255,255,255,0.06);
        border-radius:10px; padding:10px 6px;
        text-align:center;
        transition:var(--transition), transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .sb-stat:hover {
        background:rgba(61,126,255,0.09); border-color:rgba(61,126,255,0.22);
        transform:scale(1.06) translateY(-2px);
    }
    .sb-stat.gold-stat {
        background:rgba(245,183,49,0.07); border-color:rgba(245,183,49,0.20);
    }
    .sb-stat.gold-stat:hover {
        background:rgba(245,183,49,0.14); border-color:rgba(245,183,49,0.42);
        box-shadow:0 0 18px rgba(245,183,49,0.14);
    }
    .sb-stat-icon  { display:block; font-size:0.85rem; margin-bottom:2px; line-height:1; }
    .sb-stat-num   { font-family:'Plus Jakarta Sans',sans-serif; font-size:1.2rem; font-weight:700; color:var(--accent2); line-height:1; }
    .sb-stat.gold-stat .sb-stat-num { color:var(--gold); }
    .sb-stat-label { font-size:0.38rem; color:var(--sidebar-muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:4px; font-family:'DM Mono',monospace; line-height:1.3; }

    /* Dot indicator di bawah carousel */
    .sb-dots {
        display:flex; justify-content:center; gap:5px;
        margin-top:7px; position:relative; z-index:1;
    }
    .sb-dot {
        width:5px; height:5px; border-radius:50%;
        background:rgba(255,255,255,0.18);
        transition:background 0.3s ease, transform 0.3s ease;
        cursor:pointer;
    }
    .sb-dot.active {
        background:var(--gold);
        transform:scale(1.4);
        box-shadow:0 0 6px rgba(245,183,49,0.5);
    }

    /* ── Kontak ── */
    .contact-item {
        display:flex; align-items:center; gap:9px;
        margin-bottom:8px; font-size:0.58rem; color:#94a3b8;
        transition:var(--transition); cursor:pointer;
        padding:5px 7px; border-radius:7px;
        position:relative; z-index:1; text-decoration:none;
    }
    .contact-item:hover { color:var(--sidebar-text); background:rgba(255,255,255,0.05); transform:translateX(3px); }
    .contact-item i { color:var(--accent); width:14px; text-align:center; font-size:0.65rem; flex-shrink:0; }

    /* ── Skill bars ── */
    .skill-item-sb { margin-bottom:9px; position:relative; z-index:1; }
    .skill-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
    .skill-name-sb { font-size:0.57rem; font-weight:600; color:var(--sidebar-text); letter-spacing:0.5px; }
    .skill-pct { font-size:0.5rem; font-family:'DM Mono',monospace; color:var(--accent2); }
    .skill-track { height:3px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden; }
    .skill-fill  { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent),var(--teal)); width:0; transition:width 1.3s cubic-bezier(0.4,0,0.2,1); }

    /* ── Pendidikan ── */
    .edu-item {
        margin-bottom:8px; position:relative; z-index:1;
        padding:8px 10px; background:rgba(255,255,255,0.03);
        border-radius:8px; border:1px solid rgba(255,255,255,0.05); transition:var(--transition);
    }
    .edu-item:hover { background:rgba(255,255,255,0.06); }
    .edu-name { font-size:0.6rem; font-weight:700; color:var(--sidebar-text); }
    .edu-year  { font-size:0.5rem; color:var(--sidebar-muted); margin-top:2px; font-family:'DM Mono',monospace; }

    /* ── QR Code footer sidebar — satu QR multifungsi ── */
    .qr-block {
        margin-top:auto; padding-top:22px;
        display:flex; flex-direction:column; align-items:center; gap:8px;
        position:relative; z-index:1;
    }
    .qr-label {
        font-size:0.43rem; font-family:'DM Mono',monospace;
        color:var(--sidebar-muted); text-transform:uppercase; letter-spacing:1.5px;
    }
    /* Bingkai glassmorphism emas untuk QR */
    .qr-glass {
        padding:8px;
        background:rgba(245,183,49,0.06);
        border:1px solid var(--gold-border);
        border-radius:12px;
        box-shadow:0 0 22px rgba(245,183,49,0.12), inset 0 0 10px rgba(245,183,49,0.04);
        backdrop-filter:blur(8px);
        transition:var(--transition);
        position:relative;
    }
    .qr-glass:hover {
        border-color:rgba(245,183,49,0.6);
        box-shadow:0 0 36px rgba(245,183,49,0.22);
        transform:scale(1.02);
    }
    #qrCanvas canvas, #qrCanvas img { display:block; border-radius:6px; }

    /* Dua tombol aksi di bawah QR */
    .qr-actions {
        display:flex; gap:6px; width:100%;
    }
    .qr-btn {
        flex:1; display:flex; align-items:center; justify-content:center; gap:4px;
        padding:6px 4px; border-radius:8px; border:none; cursor:pointer;
        font-family:'DM Mono',monospace; font-size:0.42rem;
        font-weight:600; text-transform:uppercase; letter-spacing:0.8px;
        text-decoration:none; transition:var(--transition);
    }
    /* Tombol WA — hijau */
    .qr-btn-wa {
        background:rgba(37,211,102,0.12);
        border:1px solid rgba(37,211,102,0.28);
        color:#25d366;
    }
    .qr-btn-wa:hover {
        background:rgba(37,211,102,0.22);
        border-color:#25d366;
        box-shadow:0 0 14px rgba(37,211,102,0.25);
        transform:translateY(-2px);
    }
    /* Tombol vCard — emas */
    .qr-btn-vc {
        background:rgba(245,183,49,0.10);
        border:1px solid rgba(245,183,49,0.25);
        color:var(--gold);
    }
    .qr-btn-vc:hover {
        background:rgba(245,183,49,0.20);
        border-color:var(--gold);
        box-shadow:0 0 14px rgba(245,183,49,0.22);
        transform:translateY(-2px);
    }
    .qr-btn i { font-size:0.55rem; }

    /* ═══════════════════════════════════════
       MAIN CONTENT  62%
    ═══════════════════════════════════════ */
    .main-content {
        width:62%; padding:20px 18px 32px;
        background:var(--main-bg); overflow:hidden; position:relative;
    }
    .main-content::before {
        content:''; position:absolute; top:0; right:0; width:130px; height:130px;
        background:radial-gradient(circle at top right, rgba(61,126,255,0.055) 0%, transparent 70%);
        pointer-events:none;
    }


    /* ── Dark mode: main-content background dan teks ikut gelap ── */
    [data-theme="dark"] .main-content {
        background: var(--main-bg);
    }
    [data-theme="dark"] .profile-bio {
        background: var(--main-subtle);
        color: var(--main-muted);
        border-color: var(--accent);
    }
    [data-theme="dark"] .job-role   { color: var(--teal); }
    [data-theme="dark"] .job-period { color: var(--accent2); }
    [data-theme="dark"] .doc-label  { color: var(--main-muted); }
    [data-theme="dark"] .doc-empty  { color: var(--main-muted); }
    [data-theme="dark"] .edu-name   { color: var(--sidebar-text); }
    [data-theme="dark"] .comp-name { color: var(--comp-color); }
    [data-theme="dark"] .job-desc  { color: var(--main-muted); }
    [data-theme="dark"] .exp-item  { border-color: rgba(255,255,255,0.10); }
    [data-theme="dark"] .doc-section {
        background: rgba(30,41,59,0.85);
        border-color: rgba(245,183,49,0.18);
    }
    [data-theme="dark"] .doc-img-container {
        background: rgba(255,255,255,0.05);
        border-color: rgba(245,183,49,0.15);
    }
    [data-theme="dark"] .section-title::after {
        background: rgba(255,255,255,0.08);
    }
    [data-theme="dark"] body { background: #0d1117; }
    [data-theme="dark"] .cv-container { box-shadow: 0 24px 80px rgba(0,0,0,0.55); }

    /* ── Section title ── */
    .section-title {
        font-size:0.58rem; font-family:'DM Mono',monospace; font-weight:500;
        display:flex; align-items:center; gap:8px;
        margin-bottom:13px; color:var(--main-muted);
        text-transform:uppercase; letter-spacing:2px;
    }
    .section-title::after { content:''; flex:1; height:1px; background:var(--main-border); }
    .section-title i { color:var(--accent); font-size:0.65rem; }

    /* ═══════════════════════════════════════
       HEADER SIMETRIS — solusi definitif

       Prinsip: hanya ada SATU foto profil yaitu di sidebar.
       Di main content tidak ada foto kedua sama sekali.

       Simetri "nama sejajar tengah foto" dicapai dengan cara:
         • .profile-header menggunakan display:flex + align-items:center
         • Di kiri: kotak .ph-avatar berukuran 66×66 (transparan/invisible)
           yang tingginya sama dengan foto sidebar — ini SPACER VIRTUAL
           yang mengatur posisi vertikal teks di sebelahnya
         • Di kanan: nama + role, yang dengan align-items:center
           akan otomatis rata-tengah secara vertikal terhadap spacer
         • Bio mengalir di bawah sebagai elemen terpisah lebar penuh

       Dengan cara ini: garis tengah lingkaran foto sidebar (di kiri layar)
       secara visual sejajar dengan garis tengah teks nama (di kanan).
       Tidak ada foto duplikat, tidak ada elemen mengganggu.
    ═══════════════════════════════════════ */
    .profile-header {
        display:flex; flex-direction:column;
        margin-bottom:22px; padding-bottom:16px;
        border-bottom:1px solid var(--main-border);
        animation:fadeUp 0.6s ease 0.5s both;
    }

    /* Baris atas: spacer kiri + nama-role kanan */
    .ph-top {
        display:flex; align-items:center; gap:12px; margin-bottom:10px;
    }

    /* Nama & jabatan */
    .ph-title { flex:1; min-width:0; }
    .ph-name {
        font-family:'Plus Jakarta Sans',sans-serif; font-size:1rem; font-weight:800;
        color:var(--main-text); text-transform:uppercase;
        letter-spacing:0.4px; line-height:1.2;
    }
    .ph-role {
        font-size:0.55rem; color:var(--accent); font-family:'DM Mono',monospace;
        letter-spacing:2px; text-transform:uppercase; margin-top:4px;
    }

    /* Bio — lebar penuh, di bawah baris nama */
    .profile-bio {
        font-size:0.67rem; color:var(--main-muted); line-height:1.75;
        padding:11px 13px;
        background:var(--main-subtle);
        border-left:2.5px solid var(--accent);
        border-radius:0 8px 8px 0;
        font-style:italic; transition:var(--transition);
        position:relative; overflow:hidden;
    }
    .profile-bio::before {
        content:'\201C'; position:absolute; top:-4px; left:6px;
        font-size:2.5rem; color:var(--accent); opacity:0.13;
        font-family:serif; line-height:1;
    }
    .profile-bio:hover { border-color:var(--gold); }

    /* ── Timeline pengalaman ── */
    .exp-item {
        margin-bottom:17px; padding-left:15px;
        border-left:2px solid #e2e8f0;
        position:relative; transition:var(--transition);
    }
    .exp-item::before {
        content:''; position:absolute; left:-5px; top:5px;
        width:8px; height:8px; border-radius:50%;
        background:var(--accent); box-shadow:0 0 0 3px rgba(61,126,255,0.15);
        transition:var(--transition);
    }
    .exp-item:hover::before { background:var(--gold); box-shadow:0 0 0 5px rgba(245,183,49,0.15); transform:scale(1.2); }
    .exp-item:hover { border-color:var(--accent); }
    .comp-name { font-family:'Plus Jakarta Sans',sans-serif; font-size:0.78rem; font-weight:700; color:var(--comp-color, var(--main-text)); display:block; transition:var(--transition); }
    .exp-item:hover .comp-name { color:var(--accent); }
    .job-role   { font-size:0.57rem; color:var(--teal); font-weight:600; margin-bottom:2px; display:block; letter-spacing:0.3px; }
    .job-period { font-size:0.54rem; font-family:'DM Mono',monospace; color:var(--accent); margin-bottom:5px; display:inline-flex; align-items:center; gap:5px; }
    .job-desc   { font-size:0.62rem; color:var(--main-muted); padding-left:10px; list-style-type:disc; line-height:1.5; }

    /* ── Lampiran Dokumen — Glassmorphism emas ──
       KTP + NPWP + Ijazah wajib ada. Sertifikat DIHAPUS.        */
    .doc-section {
        margin-top:18px; padding:13px; border-radius:14px;
        background:rgba(248,250,252,0.72); backdrop-filter:blur(14px);
        border:1px solid rgba(245,183,49,0.15);
        box-shadow:0 4px 20px rgba(245,183,49,0.06);
    }
    .doc-label { font-size:0.49rem; font-family:'DM Mono',monospace; font-weight:600; color:var(--main-muted); text-transform:uppercase; letter-spacing:2px; text-align:center; margin-bottom:5px; }
    .doc-img-container {
        width:100%; border-radius:10px; margin-bottom:13px;
        overflow:hidden; cursor:pointer; transition:var(--transition);
        position:relative;
        background:rgba(255,255,255,0.60); backdrop-filter:blur(10px);
        border:1px solid rgba(245,183,49,0.18);
        box-shadow:0 2px 12px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.85);
    }
    /* Ring glow emas saat hover */

/* ── Theme toggle ── */
const html = document.documentElement;

   Ikon bulan    = sedang light mode (klik → pindah ke dark) */

    localStorage.setItem('cv_theme', next);

/* ── Share / Salin URL ── */
document.getElementById('shareBtn').addEventListener('click', () => {
    const url = window.location.href;
    const done = () => { const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };
    if (navigator.clipboard) { navigator.clipboard.writeText(url).then(done).catch(()=>{fb(url);done();}); }
    else { fb(url); done(); }
    function fb(u){ const ta=document.createElement('textarea'); ta.value=u; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }

/* ── Skill bars — animasi saat sidebar masuk viewport ── */
const sbObs = new IntersectionObserver(e=>{
    e.forEach(en=>{ if(en.isIntersecting){ en.target.querySelectorAll('.skill-fill').forEach(b=>setTimeout(()=>b.style.width=b.dataset.w+'%',200)); sbObs.unobserve(en.target); } });
},{threshold:0.3});
sbObs.observe(document.querySelector('.sidebar'));

/* ── Counter animasi untuk statistik ── */
function animCount(el, target, suffix) {
    let v = 0;
    const step = Math.max(1, Math.ceil(target / 36));
    const id = setInterval(() => {
        v = Math.min(v + step, target);
        el.textContent = v + (suffix || '');
        if (v >= target) clearInterval(id);
    }, 38);
}
/* Observasi carousel wrapper (bukan .sb-stats yang sudah tidak ada) */
const cObs = new IntersectionObserver(e => {
    e.forEach(en => {
        if (en.isIntersecting) {
            en.target.querySelectorAll('.sb-stat-num').forEach(el =>
                animCount(el, +el.dataset.target, el.dataset.suffix || ''));
            cObs.unobserve(en.target);
        }
    });
}, { threshold: 0.4 });
const carouselEl = document.getElementById('sbCarousel');
if (carouselEl) cObs.observe(carouselEl);

/* ── CAROUSEL STATISTIK ──────────────────────────────────────
   Cara kerja:
   • Setiap kotak lebar 42% dari container → ~2.3 kotak terlihat
   • "offset per step" = lebar satu kotak + gap (6px)
   • transform: translateX(-offset * idx) menggeser track
   • Auto-slide setiap 2.8 detik, loop balik ke 0 setelah kotak terakhir
   • Touch/mouse drag: catat startX saat touchstart, hitung delta
     saat touchend, geser maju/mundur jika delta > 30px
   • Dot indicator: kelas .active berpindah sesuai idx aktif
   • Pause auto-slide saat pengguna sedang menyentuh carousel
─────────────────────────────────────────────────────────────── */
(function initCarousel() {
    const carousel = document.getElementById('sbCarousel');
    const track    = document.getElementById('sbTrack');
    const dots     = document.querySelectorAll('#sbDots .sb-dot');
    if (!carousel || !track) return;

    const cards    = track.querySelectorAll('.sb-stat');
    const total    = cards.length;
    let   idx      = 0;
    let   autoId   = null;
    let   paused   = false;

    /* Hitung lebar satu langkah geser berdasarkan lebar kotak pertama */
    function stepWidth() {
        return cards[0].offsetWidth + 6; /* 6 = gap */
    }

    /* Geser track ke posisi idx tertentu */
    function goTo(i) {
        idx = Math.max(0, Math.min(i, total - 1));
        track.style.transform = `translateX(-${stepWidth() * idx}px)`;
        dots.forEach((d, di) => d.classList.toggle('active', di === idx));
    }

    /* Auto-slide: maju satu langkah, balik ke 0 setelah kotak terakhir */
    function startAuto() {
        stopAuto();
        autoId = setInterval(() => {
            if (!paused) goTo(idx >= total - 1 ? 0 : idx + 1);
        }, 2800);
    }
    function stopAuto() {
        if (autoId) { clearInterval(autoId); autoId = null; }
    }

    /* Klik dot langsung lompat ke kotak itu */
    dots.forEach(d => d.addEventListener('click', () => {
        goTo(+d.dataset.idx);
        startAuto(); /* reset timer setelah klik manual */
    }));

    /* Touch / mouse drag */
    let startX = 0, isDragging = false;

    function onStart(e) {
        startX     = e.touches ? e.touches[0].clientX : e.clientX;
        isDragging = true;
        paused     = true;
        track.style.transition = 'none'; /* drag terasa langsung tanpa delay */
    }
    function onEnd(e) {
        if (!isDragging) return;
        isDragging = false;
        paused     = false;
        track.style.transition = ''; /* kembalikan transisi CSS */
        const endX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
        const delta = startX - endX;
        if (delta > 30)       goTo(idx + 1); /* geser ke kanan */
        else if (delta < -30) goTo(idx - 1); /* geser ke kiri */
        else                  goTo(idx);     /* snap balik */
        startAuto();
    }

    /* Pasang event listener untuk touch (HP) dan mouse (desktop) */
    carousel.addEventListener('touchstart', onStart, { passive: true });
    carousel.addEventListener('touchend',   onEnd);
    carousel.addEventListener('mousedown',  onStart);
    carousel.addEventListener('mouseup',    onEnd);
    /* Cegah drag gambar browser mengganggu */
    carousel.addEventListener('dragstart',  e => e.preventDefault());

    /* Mulai */
    goTo(0);
    startAuto();
})();

/* ── Download PDF via html2pdf.js ──────────────────────────────
   Opsi B: ukuran halaman custom menyesuaikan tinggi konten,
   jadi seluruh CV muat dalam 1 "halaman" panjang tanpa terpotong.
   Dokumen KTP/NPWP/Ijazah tetap dapat halaman A4 sendiri-sendiri.
──────────────────────────────────────────────────────────────── */
document.getElementById('downloadPdfBtn').addEventListener('click', async () => {
    const overlay = document.getElementById('pdfLoading');
    const cvEl    = document.querySelector('.cv-container');

    overlay.classList.add('show');

    const hideEls = document.querySelectorAll('.toolbar, .wa-float, .toast, #scroll-bar');
    hideEls.forEach(el => el.style.visibility = 'hidden');

    const allAnimated = document.querySelectorAll('*');
    allAnimated.forEach(el => { el.style.animationPlayState = 'paused'; });

    /* Ukur tinggi asli CV supaya halaman custom pas */
    const cvHeight = cvEl.scrollHeight;
    const cvWidth  = cvEl.scrollWidth;
    /* Konversi px → mm (1px ≈ 0.2646mm pada 96dpi) */
    const mmH = Math.ceil(cvHeight * 0.2646) + 10;
    const mmW = Math.ceil(cvWidth  * 0.2646);

    const opt = {
        margin:      0,
        filename:    'Hari-Baharudin-CV.pdf',
        image:       { type: 'jpeg', quality: 0.98 },
        html2canvas: {
            scale:           2,
            useCORS:         true,
            allowTaint:      true,
            backgroundColor: '#111827',
            logging:         false,
            scrollX:         0,
            scrollY:         -window.scrollY,
            windowWidth:     540,
            windowHeight:    cvHeight,
        },
        jsPDF: {
            unit:        'mm',
            format:      [mmW, mmH],   /* ukuran custom: pas dengan isi CV */
            orientation: 'portrait',
            compress:    true,
        },
    };

    try {
        await html2pdf().set(opt).from(cvEl).save();
    } catch(e) {
        console.error('PDF error:', e);
    } finally {
        hideEls.forEach(el => el.style.visibility = '');
        allAnimated.forEach(el => el.style.animationPlayState = '');
        overlay.classList.remove('show');
    }
});

/* ── Print CV — Opsi B ─────────────────────────────────────────
   1. Sembunyikan doc-img-container yang gambarnya gagal load
   2. Pindahkan .doc-section keluar .cv-container → full width
   3. Kalau semua dokumen broken, sembunyikan seluruh doc-section
   4. Print, lalu kembalikan semua ke posisi & state semula
──────────────────────────────────────────────────────────────── */
function printCV() {
    const docSection  = document.querySelector('.doc-section');
    const mainContent = document.querySelector('.main-content');
    const pageShell   = document.querySelector('.page-shell');

    /* Sembunyikan container yang gambarnya broken */
    const brokenContainers = [];
    const brokenLabels     = [];
    if (docSection) {
        docSection.querySelectorAll('.doc-img-container').forEach(c => {
            const img = c.querySelector('img');
            /* broken jika: dataset.broken di-set oleh onerror, atau img hidden, atau src masih kosong */
            const isBroken = c.dataset.broken === '1' || (img && (img.style.display === 'none' || !img.complete || img.naturalWidth === 0));
            if (isBroken) {
                brokenContainers.push(c);
                /* Sembunyikan juga label (p.doc-label) sebelum container ini */
                const prev = c.previousElementSibling;
                if (prev && prev.classList.contains('doc-label')) { brokenLabels.push(prev); prev.style.display = 'none'; }
                c.style.display = 'none';
            }
        });
    }

    /* Cek apakah ada dokumen yang berhasil tampil */
    const hasVisibleDoc = docSection &&
        [...docSection.querySelectorAll('.doc-img-container')].some(c => c.style.display !== 'none');

    /* Kalau tidak ada dokumen, sembunyikan seluruh section */
    if (docSection && !hasVisibleDoc) {
        docSection.style.display = 'none';
        window.print();
        docSection.style.display = '';
        brokenContainers.forEach(c => c.style.display = '');
        brokenLabels.forEach(l => l.style.display = '');
        return;
    }

    /* Pindahkan doc-section keluar cv-container → full width di halaman sendiri */
    if (docSection) {
        pageShell.appendChild(docSection);
        docSection.classList.add('print-detached');
    }

    window.print();

    /* Kembalikan semua ke semula */
    if (docSection) {
        mainContent.appendChild(docSection);
        docSection.classList.remove('print-detached');
    }
    brokenContainers.forEach(c => c.style.display = '');
    brokenLabels.forEach(l => l.style.display = '');
}

/* ── Scroll Reveal — dijalankan setelah render() selesai ── */
const rObs = new IntersectionObserver(e=>{
    e.forEach(en=>{ if(en.isIntersecting){en.target.classList.add('in');rObs.unobserve(en.target);} });
},{threshold:0.08});

/* ── QR Code tunggal multifungsi ─────────────────────────────
   QR berisi link wa.me → scan dengan kamera HP manapun
   langsung membuka WhatsApp tanpa perlu simpan nomor dulu.

   Tombol "Simpan Kontak" di bawahnya men-generate file .vcf
   secara dinamis lalu memicu download — pengguna tetap bisa
   menyimpan semua kontak ke HP tanpa QR kedua.
──────────────────────────────────────────────────────────────── */
window.addEventListener('load', () => {
    if (typeof QRCode !== 'undefined') {
        new QRCode(document.getElementById('qrCanvas'), {
            text: CV_DATA.wa,
            width: 90, height: 90,

            colorLight: '#0b0f1a',
            correctLevel: QRCode.CorrectLevel.M
        });
    }

    const vcBtn = document.getElementById('vcardBtn');
    if (vcBtn) {
        vcBtn.addEventListener('click', () => {
            const vcf = [
                'BEGIN:VCARD', 'VERSION:3.0',
                `FN:${CV_DATA.nama.replace('\n', ' ')}`,
                `TITLE:${CV_DATA.jabatan}`,
                `TEL;TYPE=CELL:+${CV_DATA.wa_no}`,
                `EMAIL:${CV_DATA.email}`,
                `X-SOCIALPROFILE;type=instagram:@${CV_DATA.ig}`,
                `URL:${CV_DATA.wa}`,
                'END:VCARD'
            ].join('\r\n');
            const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
            const url  = URL.createObjectURL(blob);
            const a    = document.createElement('a');
            a.href = url; a.download = 'Hari-Baharudin.vcf'; a.click();
            URL.revokeObjectURL(url);
            const t = document.getElementById('toast');
            t.textContent = 'Kontak berhasil diunduh ✓';
            t.classList.add('show');
            setTimeout(() => { t.classList.remove('show'); t.textContent = 'Link berhasil disalin ✓'; }, 2500);

});

/* ── FITUR PREMIUM 1: Scroll Progress Bar ──
   Garis gradien emas–biru–teal bergerak di bagian paling atas
   halaman seiring pengguna menggulir konten ke bawah.          */
window.addEventListener('scroll', () => {
    const bar = document.getElementById('scroll-bar');
    if (!bar) return;
    const doc = document.documentElement;
    const pct = (doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100;
    bar.style.width = Math.min(pct, 100) + '%';
}, { passive: true });

/* ── FITUR PREMIUM 2: Particle Stars di Sidebar ──
   Titik-titik kecil berwarna emas melayang naik secara acak
   di latar sidebar, menciptakan kesan dinamis dan premium.      */
(function spawnParticles() {
    const sb = document.querySelector('.sidebar');
    if (!sb) return;
    function spawn() {
        const p    = document.createElement('div');
        p.className = 'particle';
        const size = 2 + Math.random() * 3;
        const left = 5  + Math.random() * 90;
        const top  = 40 + Math.random() * 55;
        const dur  = 4  + Math.random() * 5;
        const del  = Math.random() * 2;
        p.style.cssText = `width:${size}px;height:${size}px;left:${left}%;top:${top}%;` +
                          `animation-duration:${dur}s;animation-delay:${del}s;`;
        sb.appendChild(p);
        setTimeout(() => p.remove(), (dur + del + 0.3) * 1000);
    }
    /* 5 partikel awal langsung, lalu satu baru setiap 900ms */
    for (let i = 0; i < 5; i++) setTimeout(spawn, i * 180);
    setInterval(spawn, 900);
})();

/* ── FITUR PREMIUM 3: Typed Text Effect pada Jabatan ──
   "PROPERTY SPECIALIST" diketik satu per satu hurufnya
   setelah animasi masuk sidebar selesai (~1 detik).             */
(function typeRole() {
    const el = document.querySelector('.name-tag p');
    if (!el) return;
    const text = el.textContent.trim();
    el.textContent = '';
    let i = 0;
    setTimeout(() => {
        const id = setInterval(() => {
            el.textContent += text[i++];
            if (i >= text.length) clearInterval(id);
        }, 70);
    }, 1000);
})();
